<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
  <h1>Beginner's Quiz</h1>
  <div id="progress" class="progress">Question <span id="current-question">1</span> of 6</div>
  <div id="question" class="question-text"></div>
  <div id="answers" class="answers-container"></div>
  <div id="score-container" class="score-container" style="display: none;">
    <h2>Quiz Complete!</h2>
    <p>Your Score: <span id="final-score">0</span> / 6</p>
    <p id="score-message"></p>
    <button id="restart-btn" class="btn-restart">Restart Quiz</button>
  </div>
  <button id="next-btn" class="btn-next">Next Question</button>
</div>

<script src="script.js"></script>
</body>
</html>
